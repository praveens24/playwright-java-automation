name: Playwright Java Tests (Maven)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Build and Download Dependencies
        run: mvn dependency:resolve

      - name: Install Playwright Browsers
        run: |
          mvn dependency:build-classpath -Dmdep.outputFile=cp.txt
          java -cp "$(cat cp.txt)" com.microsoft.playwright.CLI install --with-deps --skip-if-installed

      - name: Run Playwright Tests
        run: mvn clean test

      - name: Save Test Reports and Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-java-reports
          path: |
            target/surefire-reports/**
            target/screenshots/**
          retention-days: 7