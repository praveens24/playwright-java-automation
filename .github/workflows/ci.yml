name: Playwright Java Tests (Docker Containerized)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Leverage local caching mechanisms to build the image efficiently on GitHub
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Build the Docker image exactly like you did on your MacBook
      - name: Build Framework Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: playwright-tests:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. Run the container on the CI VM and mount the target directory to preserve trace files
      - name: Run Playwright Tests inside Docker Container
        run: |
          mkdir -p target
          docker run --rm -v "${{ github.workspace }}/target:/app/target" playwright-tests:latest

      # 4. Safely harvest your test reports, screenshots, and trace zips from the mounted volume
      - name: Save Test Reports and Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-java-reports
          path: |
            target/surefire-reports/**
            target/screenshots/**
            target/playwright-traces/**
          retention-days: 7